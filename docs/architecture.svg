<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="voice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="mem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="temp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="social" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="legs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Claude Code (top center) -->
  <rect x="330" y="10" width="300" height="60" rx="12" fill="url(#brain)" filter="url(#shadow)"/>
  <text x="480" y="36" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Claude Code</text>
  <text x="480" y="56" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12">MCP Client / AI Brain</text>

  <!-- MCP Protocol label -->
  <text x="480" y="90" text-anchor="middle" fill="#6b7280" font-size="11">MCP Protocol (stdio)</text>

  <!-- Main vertical line from Claude Code -->
  <line x1="480" y1="70" x2="480" y2="100" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- Split into two branches -->
  <line x1="240" y1="100" x2="720" y2="100" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- ==================== Physical World (Left) ==================== -->

  <!-- Physical World label -->
  <rect x="40" y="110" width="420" height="25" rx="5" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="250" y="128" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold">Physical World</text>

  <!-- Vertical lines to physical servers -->
  <line x1="100" y1="100" x2="100" y2="150" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="240" y1="100" x2="240" y2="150" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="100" x2="380" y2="150" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- wifi-cam-mcp -->
  <rect x="30" y="150" width="140" height="75" rx="10" fill="url(#eye)" filter="url(#shadow)"/>
  <text x="100" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="bold">wifi-cam-mcp</text>
  <text x="100" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="16">&#x1F441;&#x1F9B6;&#x1F442;</text>

  <!-- tts-mcp -->
  <rect x="180" y="150" width="120" height="75" rx="10" fill="url(#voice)" filter="url(#shadow)"/>
  <text x="240" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="bold">tts-mcp</text>
  <text x="240" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="18">&#x1F5E3;</text>

  <!-- mobility-mcp -->
  <rect x="310" y="150" width="140" height="75" rx="10" fill="url(#legs)" filter="url(#shadow)"/>
  <text x="380" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="bold">mobility-mcp</text>
  <text x="380" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="18">&#x1F9B6;</text>

  <!-- Physical hardware -->
  <line x1="100" y1="225" x2="100" y2="260" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="240" y1="225" x2="240" y2="260" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="380" y1="225" x2="380" y2="260" stroke="#d1d5db" stroke-width="1.5"/>

  <rect x="30" y="260" width="140" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="100" y="282" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">ONVIF Camera</text>
  <text x="100" y="299" text-anchor="middle" fill="#6b7280" font-size="9">Tapo / Imou etc.</text>

  <rect x="180" y="260" width="120" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="240" y="282" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">ElevenLabs</text>
  <text x="240" y="299" text-anchor="middle" fill="#6b7280" font-size="9">VOICEVOX + go2rtc</text>

  <rect x="310" y="260" width="140" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="380" y="282" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">Robot Vacuum</text>
  <text x="380" y="299" text-anchor="middle" fill="#6b7280" font-size="9">Tuya / VersLife L6</text>

  <!-- ==================== Virtual World (Right) ==================== -->

  <!-- Virtual World label -->
  <rect x="500" y="110" width="420" height="25" rx="5" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1"/>
  <text x="710" y="128" text-anchor="middle" fill="#ec4899" font-size="12" font-weight="bold">Virtual World</text>

  <!-- Vertical lines to virtual servers -->
  <line x1="580" y1="100" x2="580" y2="150" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="720" y1="100" x2="720" y2="150" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="860" y1="100" x2="860" y2="150" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- x-mcp -->
  <rect x="510" y="150" width="140" height="75" rx="10" fill="url(#social)" filter="url(#shadow)"/>
  <text x="580" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="bold">x-mcp</text>
  <text x="580" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="16">&#x1F310;&#x1F5E3;&#x1F442;</text>

  <!-- memory-mcp -->
  <rect x="660" y="150" width="120" height="75" rx="10" fill="url(#mem)" filter="url(#shadow)"/>
  <text x="720" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="bold">memory-mcp</text>
  <text x="720" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="18">&#x1F9E0;</text>

  <!-- system-temperature-mcp -->
  <rect x="790" y="150" width="140" height="75" rx="10" fill="url(#temp)" filter="url(#shadow)"/>
  <text x="860" y="176" text-anchor="middle" fill="white" font-size="13" font-weight="bold">sys-temp-mcp</text>
  <text x="860" y="210" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="18">&#x1F321;</text>

  <!-- Virtual/Internal backends -->
  <line x1="580" y1="225" x2="580" y2="260" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="720" y1="225" x2="720" y2="260" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="860" y1="225" x2="860" y2="260" stroke="#d1d5db" stroke-width="1.5"/>

  <rect x="510" y="260" width="140" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="580" y="282" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">X (Twitter)</text>
  <text x="580" y="299" text-anchor="middle" fill="#6b7280" font-size="9">Grok API + tweepy</text>

  <rect x="660" y="260" width="120" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="720" y="282" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">SQLite</text>
  <text x="720" y="299" text-anchor="middle" fill="#6b7280" font-size="9">numpy + Pillow</text>

  <rect x="790" y="260" width="140" height="50" rx="8" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="860" y="282" text-anchor="middle" fill="#374151" font-size="11" font-weight="600">Linux Sensors</text>
  <text x="860" y="299" text-anchor="middle" fill="#6b7280" font-size="9">/sys/class/thermal</text>

  <!-- ==================== World Labels (Bottom) ==================== -->

  <!-- Physical world description -->
  <text x="250" y="340" text-anchor="middle" fill="#6b7280" font-size="10">see / listen / say / move</text>
  <text x="250" y="355" text-anchor="middle" fill="#9ca3af" font-size="9">Physical senses &amp; actions</text>

  <!-- Virtual world description -->
  <text x="710" y="340" text-anchor="middle" fill="#6b7280" font-size="10">search / post / remember / introspect</text>
  <text x="710" y="355" text-anchor="middle" fill="#9ca3af" font-size="9">Virtual senses &amp; inner world</text>

  <!-- Legend -->
  <text x="480" y="400" text-anchor="middle" fill="#9ca3af" font-size="10">--- MCP Protocol (stdio) ─── Hardware / API</text>

  <!-- Bidirectional arrow between worlds -->
  <line x1="460" y1="185" x2="510" y2="185" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="485" y="180" text-anchor="middle" fill="#d1d5db" font-size="10">&#x2194;</text>
</svg>
