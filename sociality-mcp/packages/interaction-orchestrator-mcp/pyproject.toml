[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "interaction-orchestrator-mcp"
version = "0.1.0"
description = "Human Response Orchestrator for Embodied Claude — turns substrate signals into stable social moves"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.26.0",
    "pydantic>=2.7.0",
    "social-core",
    "social-state-mcp",
    "relationship-mcp",
    "joint-attention-mcp",
    "boundary-mcp",
    "self-narrative-mcp",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/interaction_orchestrator_mcp"]

[tool.uv.sources]
social-core = { path = "../social-core" }
social-state-mcp = { path = "../social-state-mcp" }
relationship-mcp = { path = "../relationship-mcp" }
joint-attention-mcp = { path = "../joint-attention-mcp" }
boundary-mcp = { path = "../boundary-mcp" }
self-narrative-mcp = { path = "../self-narrative-mcp" }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
